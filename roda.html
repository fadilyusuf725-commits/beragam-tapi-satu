<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roda Budaya - Kita Beragam, Tetapi Tetap Satu</title>
    <meta name="description" content="Putar Roda Budaya dan jawab kuis tentang kebudayaan Indonesia! Sunda, Jawa, Bali, Bugis, dan lebih banyak lagi.">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .wheel-page-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        @media (min-width: 900px) {
            .wheel-page-layout {
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
                gap: 4rem;
            }

            .wheel-side {
                flex: 0 0 420px;
            }

            .info-side {
                flex: 1;
                max-width: 420px;
                text-align: left;
            }
        }

        .spin-score {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .score-box {
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.8rem;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
        }

        .score-value {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--primary);
        }

        .result-culture-box {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-top: 1.5rem;
            animation: popIn 0.4s ease;
            text-align: center;
        }

        .result-culture-box h3 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .result-culture-box p {
            font-size: 1rem;
            color: #666;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🇮🇩 Bhinneka Tunggal Ika</div>
        <button class="nav-toggle" id="nav-toggle" aria-label="Buka Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">🏠 Beranda</a></li>
            <li><a href="identitas.html">🪪 Identitasku</a></li>
            <li><a href="eksplorasi.html">🗺️ 34 Provinsi</a></li>
            <li><a href="permainan.html">🎮 Game</a></li>
            <li><a href="roda.html" class="active">🎡 Roda Budaya</a></li>
        </ul>
    </nav>
    <div class="nav-overlay" id="nav-overlay"></div>

    <section class="section wheel-section fade-in" style="min-height: calc(100vh - 70px);">
        <h2 class="section-title">🎡 Putar Roda & Jawab Kuis!</h2>
        <p class="section-subtitle">Roda berhenti → Kuis Budaya muncul!</p>

        <!-- Scoreboard -->
        <div class="spin-score">
            <div class="score-box">
                <div class="score-label">✅ Benar</div>
                <div class="score-value" id="score-correct">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">❌ Salah</div>
                <div class="score-value" id="score-wrong">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">🎡 Putaran</div>
                <div class="score-value" id="score-spins">0</div>
            </div>
        </div>

        <div class="wheel-page-layout">
            <div class="wheel-side">
                <div class="wheel-container">
                    <div class="pointer">▼</div>
                    <div class="wheel" id="spin-wheel">
                        <!-- Segments injected by app.js -->
                    </div>
                    <div class="wheel-center"></div>
                </div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button id="spin-btn" class="btn-primary" style="font-size: 1.2rem; padding: 1rem 2.5rem;">
                        🎡 Putar Roda!
                    </button>
                </div>
            </div>
            <div class="info-side" id="info-side" style="display: none;">
                <!-- Filled by JS after spin -->
            </div>
        </div>
    </section>

    <!-- Quiz Modal -->
    <div class="modal-overlay" id="quiz-modal">
        <div class="modal-box">
            <img id="quiz-image" src="" alt="Budaya" 
                 style="width: 100px; height: 100px; object-fit: contain; margin: 0 auto 1rem; display: block; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.15));">
            <h2 class="modal-title" id="quiz-title">Budaya Sunda</h2>
            <p class="modal-quiz" id="quiz-question"></p>
            <div class="quiz-options" id="quiz-options-container"></div>
            <div id="quiz-feedback" style="margin-top: 1rem; font-size: 1.1rem; font-weight: bold; display: none;"></div>
            <button id="close-modal" class="btn-primary" style="margin-top: 1.5rem; display: none; width: 100%;">
                Lanjutkan Bermain →
            </button>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <footer>
        <p>✨ Kebanggaan menjadi Anak Indonesia 🇮🇩 ✨</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
